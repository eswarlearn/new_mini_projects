syntax = "proto3";

package doctor.v1;

option go_package = "github.com/eswar/grpc-doctor-booking/gen/go/doctor/v1;doctorv1";

import "google/api/annotations.proto";
import "buf/validate/validate.proto";
import "common/v1/pagination.proto";

message Doctor {
  string id = 1;
  string name = 2;
  string specialization = 3;
  int32 years_experience = 4;
}

message ListDoctorsRequest {
  string specialization = 1 [(buf.validate.field).string = {min_len: 2, max_len: 50}];
  common.v1.PageRequest page = 2;
}

message ListDoctorsResponse {
  repeated Doctor doctors = 1;
  common.v1.PageResponse page = 2;
}

service DoctorService {
  rpc ListDoctors(ListDoctorsRequest) returns (ListDoctorsResponse) {
    option (google.api.http) = {
      get: "/v1/doctors"
    };
  }
}
